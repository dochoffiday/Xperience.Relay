name: Publish NuGet packages

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet build src/Xperience.Relay.Contracts/Xperience.Relay.Contracts.csproj \
            src/Xperience.Relay.Core/Xperience.Relay.Core.csproj \
            src/Xperience.Relay.Client/Xperience.Relay.Client.csproj \
            src/Xperience.Relay.Hosting/Xperience.Relay.Hosting.csproj \
            src/Xperience.Relay.Kentico/Xperience.Relay.Kentico.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: |
          dotnet pack src/Xperience.Relay.Contracts/Xperience.Relay.Contracts.csproj \
            src/Xperience.Relay.Core/Xperience.Relay.Core.csproj \
            src/Xperience.Relay.Client/Xperience.Relay.Client.csproj \
            src/Xperience.Relay.Hosting/Xperience.Relay.Hosting.csproj \
            src/Xperience.Relay.Kentico/Xperience.Relay.Kentico.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./nupkgs \
            --no-build

      - name: Get NuGet OIDC token
        id: nuget-token
        run: |
          token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" | jq -r '.value')
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ steps.nuget-token.outputs.token }} --source https://api.nuget.org/v3/index.json --skip-duplicate
